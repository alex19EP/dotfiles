# Register the dongle->analog mirror script as a WirePlumber component.
#
# `required` is what actually pulls the component in (a bare `optional` feature
# that nothing `wants` is never loaded). To keep this safe on an Orca-dependent
# machine, the script itself wraps its setup in pcall, so even a future API
# break can't stop WirePlumber from starting -- it would just disable the mirror.
#
# Script lives at ~/.local/share/wireplumber/scripts/mirror-dongle-to-analog.lua
# (custom scripts must be under XDG_DATA_HOME, not the config dir).

wireplumber.components = [
  {
    name = mirror-dongle-to-analog.lua
    type = script/lua
    provides = custom.dongle-mirror
  }
]

wireplumber.profiles = {
  main = {
    custom.dongle-mirror = required
  }
}
